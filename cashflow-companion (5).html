<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cashflow Companion</title>
<template id="__bundler_thumbnail" data-bg-color="#0E5C4A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0E5C4A"/>
    <g transform="translate(600 340)" fill="none" stroke="#FAFAF8" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-150 40 L-40 -70 L40 10 L150 -100"/>
      <path d="M90 -100 L150 -100 L150 -40"/>
    </g>
    <text x="600" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#FAFAF8">Cashflow Companion</text>
    <text x="600" y="580" text-anchor="middle" font-family="monospace" font-size="34" fill="rgba(250,250,248,.72)">Safe-to-Pay, defended.</text>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     CASHFLOW COMPANION — single-file scripted demo prototype
     All data is hard-coded (see PERSONAS in the script below).
     Scripted demo beats are marked with  // ◆ BEAT
     ============================================================ */

  :root{
    /* surfaces */
    --paper:#FAFAF8;
    --paper-2:#F4F4F1;
    --card:#FFFFFF;
    --ink:#1A1A1A;
    --ink-2:#4A4A47;
    --ink-3:#86867F;
    --hair:rgba(0,0,0,0.07);
    --hair-2:rgba(0,0,0,0.12);
    /* brand */
    --green:#0E5C4A;
    --green-soft:#E7F0EC;
    --green-ink:#0A4233;
    --ink-blue:#1E3A5F;
    /* status */
    --funded:#1E7A5E;
    --funded-soft:#E4F2EC;
    --amber:#B5780B;
    --amber-soft:#FBF1DC;
    --red:#B23A3A;
    --red-soft:#F8E7E5;
    /* shadows */
    --sh-sm:0 1px 2px rgba(20,20,20,.04), 0 1px 3px rgba(20,20,20,.05);
    --sh-md:0 2px 4px rgba(20,20,20,.04), 0 8px 24px rgba(20,20,20,.06);
    --sh-lg:0 4px 8px rgba(20,20,20,.05), 0 18px 48px rgba(20,20,20,.10);
    --radius:16px;
    --radius-sm:11px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    font-size:15px;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
  p{margin:0}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--green);text-decoration:none}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  .rail{
    background:linear-gradient(180deg,#FBFBF9,#F5F5F2);
    border-right:1px solid var(--hair);
    padding:22px 16px;display:flex;flex-direction:column;gap:6px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
  .brand .mark{
    width:30px;height:30px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--green),#147a61);
    display:grid;place-items:center;color:#fff;box-shadow:var(--sh-sm)
  }
  .brand .name{font-weight:700;font-size:15px;letter-spacing:-0.02em}
  .brand .sub{font-size:11px;color:var(--ink-3);margin-top:-2px}

  .persona-switch{
    background:var(--card);border:1px solid var(--hair);border-radius:var(--radius-sm);
    padding:8px;margin-bottom:14px;box-shadow:var(--sh-sm)
  }
  .persona-switch .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);padding:2px 4px 6px;font-weight:600}
  .persona-opt{
    width:100%;text-align:left;background:transparent;border:0;border-radius:8px;
    padding:8px 9px;display:flex;align-items:center;gap:9px;color:var(--ink-2);
    transition:background .15s;
  }
  .persona-opt:hover{background:var(--paper-2)}
  .persona-opt[aria-pressed="true"]{background:var(--green-soft);color:var(--green-ink)}
  .persona-opt .av{
    width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-size:11px;font-weight:700;color:#fff;
  }
  .persona-opt .pmeta{display:flex;flex-direction:column;line-height:1.25;min-width:0}
  .persona-opt .pn{font-weight:600;font-size:13px}
  .persona-opt .pd{font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .nav-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);padding:10px 8px 4px;font-weight:600}
  .nav-btn{
    width:100%;text-align:left;background:transparent;border:0;border-radius:9px;
    padding:9px 10px;display:flex;align-items:center;gap:11px;color:var(--ink-2);
    font-size:13.5px;font-weight:500;transition:background .15s,color .15s;position:relative;
  }
  .nav-btn:hover{background:var(--paper-2)}
  .nav-btn[aria-current="page"]{background:var(--card);color:var(--ink);box-shadow:var(--sh-sm);font-weight:600}
  .nav-btn .ic{width:17px;height:17px;flex:none;opacity:.75}
  .nav-btn[aria-current="page"] .ic{opacity:1;color:var(--green)}
  .nav-btn .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}

  .rail-foot{margin-top:auto;padding:14px 8px 2px;font-size:10.5px;color:var(--ink-3);border-top:1px solid var(--hair)}

  /* ---------- Main canvas ---------- */
  main{padding:34px 44px 80px;max-width:1180px;width:100%}
  .view-head{margin-bottom:26px}
  .view-head .eyebrow{font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--green);font-weight:600;margin-bottom:7px}
  .view-head h1{font-size:25px}
  .view-head p{color:var(--ink-2);margin-top:6px;max-width:62ch}

  .card{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);box-shadow:var(--sh-md)}
  .pad{padding:22px 24px}
  .grid{display:grid;gap:18px}
  .cols-2{grid-template-columns:1fr 1fr}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .span-2{grid-column:span 2}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;line-height:1}
  .pill .pdot{width:6px;height:6px;border-radius:50%}
  .pill.ok{background:var(--funded-soft);color:var(--funded)}
  .pill.ok .pdot{background:var(--funded)}
  .pill.warn{background:var(--amber-soft);color:var(--amber)}
  .pill.warn .pdot{background:var(--amber)}
  .pill.bad{background:var(--red-soft);color:var(--red)}
  .pill.bad .pdot{background:var(--red)}
  .pill.neutral{background:var(--paper-2);color:var(--ink-2)}
  .pill.neutral .pdot{background:var(--ink-3)}

  .sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

  .disclaimer{display:flex;align-items:center;gap:8px;color:var(--ink-3);font-size:12px;margin-top:26px}
  .disclaimer svg{flex:none}

  /* ---------- The Catch ---------- */
  .catch-wrap{max-width:760px;margin:0 auto}
  .catch-card{
    position:relative;overflow:hidden;border:1px solid rgba(181,120,11,.28);
    background:linear-gradient(160deg,#FFFDF8,#FCF6EA);box-shadow:var(--sh-lg);border-radius:22px;padding:38px 40px;
  }
  .catch-card::before{
    content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background:radial-gradient(680px 280px at 88% -10%, rgba(181,120,11,.10), transparent 60%);
  }
  .catch-badge{display:inline-flex;align-items:center;gap:8px;background:var(--amber-soft);color:var(--amber);font-weight:600;font-size:12.5px;padding:6px 13px;border-radius:999px}
  .catch-card h1{font-size:33px;line-height:1.18;margin:20px 0 0;max-width:18ch}
  .catch-card .lede{color:var(--ink-2);font-size:16px;margin-top:14px;max-width:54ch}
  .catch-change{display:flex;gap:12px;margin-top:24px;padding:16px 18px;background:rgba(255,255,255,.7);border:1px solid var(--hair);border-radius:14px}
  .catch-change .k{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);font-weight:600;margin-bottom:3px}
  .move-box{margin-top:22px;background:#fff;border:1px solid var(--hair);border-radius:16px;padding:20px 22px;box-shadow:var(--sh-sm)}
  .move-box .ml{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:700;margin-bottom:8px}
  .move-box .mt{font-size:18px;font-weight:600;letter-spacing:-0.01em}
  .move-actions{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}

  .btn{
    border:1px solid var(--hair-2);background:#fff;color:var(--ink);font-weight:600;font-size:14px;
    padding:11px 18px;border-radius:11px;transition:transform .12s,box-shadow .15s,background .15s;box-shadow:var(--sh-sm)
  }
  .btn:hover{box-shadow:var(--sh-md)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .btn.primary:hover{background:#0c4f40}
  .btn.ghost{background:transparent;box-shadow:none;border-color:var(--hair-2)}
  .btn.sm{padding:8px 13px;font-size:13px}
  .btn:focus-visible,.nav-btn:focus-visible,.persona-opt:focus-visible,input:focus-visible,[tabindex]:focus-visible{
    outline:2.5px solid var(--ink-blue);outline-offset:2px
  }

  /* ---------- Hero number ---------- */
  .hero{
    position:relative;overflow:hidden;border-radius:20px;color:#fff;padding:32px 34px;box-shadow:var(--sh-lg);
    background:linear-gradient(150deg,#114b3d 0%, #0E5C4A 46%, #12705a 100%);
  }
  .hero::after{content:"";position:absolute;inset:0;opacity:.55;pointer-events:none;
    background:radial-gradient(620px 300px at 92% -30%, rgba(255,255,255,.16), transparent 62%);}
  .hero .h-lbl{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.72);font-weight:600;position:relative}
  .hero .h-num{font-size:62px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin:10px 0 0;position:relative}
  .hero .h-range{font-size:14px;color:rgba(255,255,255,.82);margin-top:12px;position:relative}
  .hero .h-range b{color:#fff;font-weight:600}
  .hero .h-reason{font-size:15px;line-height:1.55;color:rgba(255,255,255,.92);margin-top:16px;max-width:60ch;position:relative}
  .hero .h-foot{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;position:relative}
  .hero .hpill{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}

  /* thinking shimmer */
  .thinking{position:relative}
  .thinking::before{
    content:"";position:absolute;inset:0;border-radius:inherit;z-index:5;
    background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.22) 50%,transparent 80%);
    background-size:220% 100%;animation:shim 1.05s linear infinite;pointer-events:none
  }
  @keyframes shim{from{background-position:180% 0}to{background-position:-80% 0}}
  .num-flash{animation:flash .6s ease}
  @keyframes flash{0%{color:#bfe6d8}100%{}}

  /* ---------- Allocation buckets ---------- */
  .bucket{display:flex;align-items:center;gap:14px;padding:14px 2px;border-bottom:1px solid var(--hair)}
  .bucket:last-child{border-bottom:0}
  .bk-rank{width:22px;height:22px;flex:none;border-radius:7px;background:var(--paper-2);color:var(--ink-3);font-size:11px;font-weight:700;display:grid;place-items:center}
  .bk-main{flex:1;min-width:0}
  .bk-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .bk-name{font-weight:600;font-size:14px}
  .bk-amt{font-size:14px;font-weight:600}
  .bk-bar{height:7px;border-radius:6px;background:var(--paper-2);margin-top:8px;overflow:hidden}
  .bk-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.22,1,.36,1)}
  .bk-fill.ok{background:linear-gradient(90deg,#1E7A5E,#28906f)}
  .bk-fill.warn{background:linear-gradient(90deg,#B5780B,#d09226)}
  .bk-fill.bad{background:linear-gradient(90deg,#B23A3A,#cc5454)}
  .bk-fill.paused{background:repeating-linear-gradient(45deg,#cfcfca,#cfcfca 6px,#e0e0db 6px,#e0e0db 12px)}
  .bk-sub{font-size:11.5px;color:var(--ink-3);margin-top:5px}

  /* ---------- charts ---------- */
  .chart-wrap{width:100%}
  svg .floor-line{stroke:var(--red);stroke-dasharray:4 4;stroke-width:1.5}
  svg text{font-family:'JetBrains Mono',monospace;fill:var(--ink-3);font-size:10px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--ink-2)}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}

  /* income rows */
  .inc-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair)}
  .inc-row:last-child{border-bottom:0}
  .inc-name{font-weight:600;font-size:13.5px}
  .inc-bar-track{flex:1;height:10px;background:var(--paper-2);border-radius:6px;position:relative;min-width:80px}
  .inc-bar{position:absolute;height:100%;border-radius:6px;background:linear-gradient(90deg,#1E3A5F,#2f5687);opacity:.85}
  .inc-amt{width:78px;text-align:right;font-size:13px;font-weight:600}

  .cadence{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--paper-2);color:var(--ink-2)}
  .cadence.retainer{background:#EAF0F6;color:#1E3A5F}
  .cadence.project{background:#EEEAF6;color:#4B3A75}
  .cadence.windfall{background:#FBF1DC;color:var(--amber)}

  /* tax gauge */
  .gauge-wrap{display:flex;align-items:center;gap:22px}
  .gauge-meta .gm-big{font-size:30px;font-weight:700;letter-spacing:-0.02em}
  .gauge-meta .gm-sub{font-size:12.5px;color:var(--ink-2);margin-top:4px}

  /* recurring list */
  .rec{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair);font-size:13.5px}
  .rec:last-child{border-bottom:0}
  .rec .rname{font-weight:500}
  .rec .ramt{margin-left:auto;font-weight:600}

  /* ---------- Goal config ---------- */
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
  .field .hint{font-size:11.5px;color:var(--ink-3);font-weight:400;margin-left:6px}
  .input-money{display:flex;align-items:center;border:1px solid var(--hair-2);border-radius:11px;background:#fff;padding:0 14px;transition:box-shadow .15s,border-color .15s}
  .input-money:focus-within{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .input-money .pre{color:var(--ink-3);font-weight:600;margin-right:4px}
  .input-money input{border:0;outline:0;padding:11px 0;font-size:15px;font-family:'JetBrains Mono',monospace;font-weight:600;width:100%;background:transparent;color:var(--ink)}
  select{width:100%;padding:11px 13px;border:1px solid var(--hair-2);border-radius:11px;background:#fff;font-family:inherit;font-size:14px;color:var(--ink)}

  .prio-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .prio-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#fff;border:1px solid var(--hair-2);border-radius:11px;cursor:grab;transition:box-shadow .15s,transform .12s,opacity .15s}
  .prio-item:hover{box-shadow:var(--sh-sm)}
  .prio-item.dragging{opacity:.45;box-shadow:var(--sh-md)}
  .prio-item.over{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .prio-grip{color:var(--ink-3);cursor:grab}
  .prio-rank{width:22px;height:22px;border-radius:7px;background:var(--green-soft);color:var(--green-ink);font-size:11px;font-weight:700;display:grid;place-items:center}
  .prio-name{font-weight:600;font-size:14px}
  .prio-lock{margin-left:auto;font-size:10.5px;color:var(--ink-3);font-weight:600}

  /* ---------- Re-plan console ---------- */
  .console{background:linear-gradient(180deg,#1b1c1a,#141513);border-radius:18px;padding:24px 26px;color:#e9e9e4;box-shadow:var(--sh-lg);position:relative;overflow:hidden}
  .console .ctitle{display:flex;align-items:center;gap:9px;font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#9a9a92;font-weight:600;margin-bottom:4px}
  .console .csub{color:#b9b9b1;font-size:13px;margin-bottom:20px}
  .trig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .trig{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:16px;text-align:left;color:#e9e9e4;transition:background .15s,transform .12s,border-color .15s}
  .trig:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2)}
  .trig:active{transform:translateY(1px)}
  .trig .tic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.08);margin-bottom:12px}
  .trig .tt{font-weight:600;font-size:14px;margin-bottom:4px}
  .trig .td{font-size:12px;color:#a9a9a1;line-height:1.45}
  .trig .tk{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7d7d75;font-weight:600;margin-top:11px}

  .agent-strip{display:flex;align-items:center;gap:12px;margin-top:20px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;min-height:58px}
  .agent-orb{width:30px;height:30px;border-radius:50%;flex:none;background:radial-gradient(circle at 35% 30%,#3ad6ad,#0E5C4A);box-shadow:0 0 0 0 rgba(58,214,173,.5)}
  .agent-orb.busy{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,214,173,.45)}70%{box-shadow:0 0 0 12px rgba(58,214,173,0)}100%{box-shadow:0 0 0 0 rgba(58,214,173,0)}}
  .agent-txt{font-size:13.5px;color:#d6d6cf}
  .agent-txt b{color:#fff}

  .replan-out{margin-top:18px}
  .delta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .delta-num{font-size:15px;font-weight:600}
  .arrow{color:var(--ink-3)}

  .log{margin-top:16px;border-top:1px solid var(--hair);padding-top:14px}
  .log-item{display:flex;gap:11px;padding:8px 0;font-size:13px;color:var(--ink-2);align-items:flex-start;animation:slideIn .4s ease}
  .log-time{font-size:11px;color:var(--ink-3);min-width:52px;font-family:'JetBrains Mono',monospace;padding-top:1px}
  .log-dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex:none}

  @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}

  /* ---------- The Plan (print) ---------- */
  .plan-doc{background:#fff;border:1px solid var(--hair);border-radius:var(--radius);box-shadow:var(--sh-md);padding:0;max-width:840px;margin:0 auto;overflow:hidden}
  .plan-band{background:linear-gradient(135deg,#0E5C4A,#12705a);color:#fff;padding:30px 40px}
  .plan-band h2{color:#fff;font-size:22px}
  .plan-band .pb-sub{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px}
  .plan-body{padding:34px 40px}
  .plan-hero{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--hair);padding-bottom:22px;margin-bottom:22px}
  .plan-hero .pn{font-size:42px;font-weight:700;letter-spacing:-0.03em;color:var(--green)}
  table.plan-tbl{width:100%;border-collapse:collapse;margin-top:8px}
  table.plan-tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);padding:8px 10px;border-bottom:1px solid var(--hair-2)}
  table.plan-tbl td{padding:10px;border-bottom:1px solid var(--hair);font-size:13.5px}
  table.plan-tbl td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600}
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:24px}

  /* ---------- Email preview ---------- */
  .phone{width:380px;margin:0 auto;background:#0f0f0e;border-radius:42px;padding:12px;box-shadow:var(--sh-lg)}
  .phone-screen{background:#f2f2ef;border-radius:32px;overflow:hidden;height:720px;display:flex;flex-direction:column}
  .phone-notch{height:30px;display:grid;place-items:center}
  .phone-notch::after{content:"";width:120px;height:6px;border-radius:99px;background:#0f0f0e}
  .mail-bar{background:#fff;padding:13px 18px;border-bottom:1px solid var(--hair);font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:8px}
  .mail-scroll{overflow-y:auto;flex:1;padding:0}
  .mail-head{padding:18px 20px 14px;background:#fff;border-bottom:1px solid var(--hair)}
  .mail-from{display:flex;align-items:center;gap:10px}
  .mail-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),#147a61);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex:none}
  .mail-subj{font-size:16px;font-weight:700;margin-top:14px;letter-spacing:-0.01em}
  .mail-body{padding:20px;font-size:13.5px;color:var(--ink-2);line-height:1.6}
  .mail-cta{display:block;text-align:center;background:var(--green);color:#fff;font-weight:600;padding:13px;border-radius:11px;margin:18px 0 6px}
  .mail-figure{background:var(--amber-soft);border:1px solid rgba(181,120,11,.25);border-radius:12px;padding:14px 16px;margin:14px 0}

  /* ---------- Behind the curtain ---------- */
  .mcp-row{display:flex;align-items:flex-start;gap:14px;padding:15px 0;border-bottom:1px solid var(--hair)}
  .mcp-row:last-child{border-bottom:0}
  .mcp-ic{width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;background:var(--paper-2);color:var(--green)}
  .mcp-row.custom .mcp-ic{background:var(--green-soft)}
  .mcp-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  .mcp-tools{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-3);margin-top:5px}
  .star{color:var(--amber);font-size:11px;font-weight:700;background:var(--amber-soft);padding:2px 8px;border-radius:999px}

  .trace{position:relative;padding-left:24px}
  .trace::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--hair-2)}
  .trace-item{position:relative;padding:9px 0}
  .trace-item::before{content:"";position:absolute;left:-21px;top:13px;width:11px;height:11px;border-radius:50%;background:#fff;border:2.5px solid var(--green)}
  .trace-t{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3)}
  .trace-d{font-size:13.5px;font-weight:500;margin-top:2px}
  .trace-meta{font-size:11.5px;color:var(--ink-3);margin-top:1px}

  .kpis{display:flex;gap:10px;flex-wrap:wrap}
  .kpi{background:var(--paper);border:1px solid var(--hair);border-radius:11px;padding:11px 14px;flex:1;min-width:120px}
  .kpi .kv{font-size:20px;font-weight:700;letter-spacing:-0.02em}
  .kpi .kl{font-size:11px;color:var(--ink-3);margin-top:2px}

  /* ---------- responsive ---------- */
  @media (max-width:980px){
    .app{grid-template-columns:1fr}
    .rail{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:8px}
    .rail .brand{padding-bottom:0;width:100%}
    .nav-lbl,.rail-foot,.persona-switch .lbl{display:none}
    .persona-switch{display:flex;gap:6px;margin:0;padding:6px}
    .nav-btn{width:auto}
    main{padding:24px 20px 60px}
    .cols-2,.cols-3,.plan-grid,.span-2{grid-template-columns:1fr;grid-column:auto}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }

  /* ---------- print ---------- */
  @media print{
    .rail,.no-print,.disclaimer.screen{display:none !important}
    .app{display:block}
    main{padding:0;max-width:none}
    body{background:#fff}
    .plan-doc{box-shadow:none;border:0;max-width:none}
    .plan-band{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    @page{margin:14mm}
  }
  /* ---------- serif accent (landing hero only) ---------- */
  .serif{font-family:'Newsreader',Georgia,'Times New Roman',serif;letter-spacing:-0.015em;font-weight:400}

  /* ---------- Landing (full-bleed, no rail) ---------- */
  .app.landing-mode{grid-template-columns:1fr}
  .app.landing-mode .rail{display:none}
  .app.landing-mode main{padding:0;max-width:none}
  .lp{width:100%;background:
    radial-gradient(1200px 520px at 78% -10%, rgba(18,112,90,.10), transparent 60%),
    radial-gradient(900px 460px at 6% 2%, rgba(30,58,95,.06), transparent 62%),
    var(--paper)}
  .lp-inner{max-width:1180px;margin:0 auto;padding:0 44px}
  .lp-nav{display:flex;align-items:center;justify-content:space-between;padding:24px 0}
  .lp-nav .brand{padding:0}
  .lp-actions{display:flex;align-items:center;gap:10px}
  .lp-link{color:var(--ink-2);font-weight:600;font-size:14px;padding:9px 13px;border-radius:9px;transition:background .15s}
  .lp-link:hover{background:var(--paper-2)}
  .lp-hero{display:grid;grid-template-columns:1.02fr .98fr;gap:56px;align-items:center;padding:48px 0 72px}
  .lp-eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--green);font-weight:700;margin-bottom:22px}
  .lp-hero h1{font-size:60px;line-height:1.04;letter-spacing:-0.02em}
  .lp-hero h1 em{font-style:italic;color:var(--green)}
  .lp-sub{font-size:18px;line-height:1.62;color:var(--ink-2);margin-top:24px;max-width:45ch}
  .lp-sub b{color:var(--ink);font-weight:600}
  .lp-cta{display:flex;align-items:center;gap:16px;margin-top:32px}
  .btn.lg{padding:14px 24px;font-size:15px;border-radius:13px}
  /* product mock */
  .lp-mock{position:relative;padding:8px}
  .lp-mock .float{animation:float 7s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .mock-card{position:relative;overflow:hidden;border-radius:22px;color:#fff;padding:32px 34px;box-shadow:var(--sh-lg);
    background:linear-gradient(150deg,#114b3d 0%,#0E5C4A 46%,#12705a 100%)}
  .mock-card::after{content:"";position:absolute;inset:0;opacity:.55;pointer-events:none;
    background:radial-gradient(560px 300px at 92% -30%,rgba(255,255,255,.16),transparent 62%)}
  .mock-lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.72);font-weight:600;position:relative}
  .mock-num{font-size:60px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin:12px 0 0;position:relative}
  .mock-range{font-size:13.5px;color:rgba(255,255,255,.85);margin-top:13px;position:relative}
  .mock-range b{color:#fff;font-weight:600}
  .mock-foot{margin-top:20px;display:flex;gap:9px;flex-wrap:wrap;position:relative}
  .mock-foot .hpill{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px}
  .mock-badge{position:absolute;top:-14px;left:-14px;background:#fff;color:var(--amber);border:1px solid rgba(181,120,11,.28);box-shadow:var(--sh-md);font-size:12px;font-weight:700;padding:8px 13px;border-radius:12px;display:flex;align-items:center;gap:7px;z-index:2}
  .mock-chip{position:absolute;bottom:-20px;right:-6px;background:#fff;border:1px solid var(--hair);box-shadow:var(--sh-md);border-radius:14px;padding:12px 15px;max-width:220px;z-index:2}
  /* trust strip */
  .lp-trust{border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);background:rgba(255,255,255,.5)}
  .lp-trust .lp-inner{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding-top:28px;padding-bottom:28px}
  .trust-item{display:flex;gap:12px;align-items:flex-start}
  .trust-item svg{flex:none;color:var(--green);margin-top:2px}
  .trust-item .tk{font-weight:700;font-size:13.5px}
  .trust-item .tv{font-size:12.5px;color:var(--ink-3);margin-top:3px;line-height:1.45}
  /* landing sections */
  .lp-sec{padding:78px 0}
  .lp-sec.tint{background:rgba(255,255,255,.55);border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}
  .sec-eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--green);font-weight:700;margin-bottom:16px}
  .lp-sec h2{font-size:34px;letter-spacing:-0.02em;max-width:22ch}
  .lp-sec .lead{font-size:17px;color:var(--ink-2);line-height:1.66;max-width:62ch;margin-top:18px}
  .lp-sec .lead b{color:var(--ink);font-weight:600}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:42px}
  .step{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:26px;box-shadow:var(--sh-sm)}
  .step .sn{width:34px;height:34px;border-radius:10px;background:var(--green-soft);color:var(--green-ink);display:grid;place-items:center;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:16px}
  .step h3{font-size:16.5px}
  .step p{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-top:8px}
  .step .tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-top:14px;display:inline-block}
  .lp-two{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch;margin-top:8px}
  .feature-card{background:var(--card);border:1px solid var(--hair);border-radius:20px;padding:30px;box-shadow:var(--sh-md)}
  .feature-card.amber{background:linear-gradient(160deg,#FFFDF8,#FCF6EA);border-color:rgba(181,120,11,.22)}
  .feature-card h3{font-size:19px}
  .feature-card p{font-size:14px;color:var(--ink-2);line-height:1.6;margin-top:10px}
  .mini-txn{background:var(--paper);border:1px solid var(--hair);border-radius:14px;padding:16px 18px;margin-top:20px}
  .mini-txn .amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px}
  .mini-txn .q{font-size:13px;color:var(--ink-2);margin-top:6px}
  .mini-conf{height:6px;border-radius:6px;background:var(--paper-2);margin-top:13px;overflow:hidden}
  .mini-conf i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#1E3A5F,#2f5687);width:61%}
  .lp-foot{border-top:1px solid var(--hair);padding:32px 0;color:var(--ink-3);font-size:12.5px}
  .lp-foot .lp-inner{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}

  /* ---------- Transaction Interpreter ---------- */
  .txn{position:relative;overflow:hidden;border:1px solid rgba(30,58,95,.2);
    background:linear-gradient(155deg,#FBFCFD,#EEF3F9);box-shadow:var(--sh-md)}
  .txn .txn-flag{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--ink-blue);
    background:#E9EFF6;border:1px solid rgba(30,58,95,.16);padding:5px 11px;border-radius:999px}
  .txn .txn-amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-top:15px}
  .txn .txn-q{font-size:15px;color:var(--ink);font-weight:600;margin-top:5px}
  .txn .txn-meta{font-size:12.5px;color:var(--ink-3);margin-top:5px;max-width:58ch}
  .conf-row{display:flex;align-items:center;gap:12px;margin-top:16px}
  .conf-lbl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
  .conf-bar{flex:1;height:8px;border-radius:6px;background:#E2E7EE;overflow:hidden}
  .conf-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#1E3A5F,#2f5687);transition:width .8s cubic-bezier(.22,1,.36,1)}
  .conf-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--ink-blue)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid var(--hair);border-radius:999px;padding:5px 11px}
  .chip .ck{color:var(--ink-3);font-weight:500}
  .txn-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
  .txn-confirmed{display:flex;align-items:center;gap:13px}
  .txn-confirmed .ok-ic{width:36px;height:36px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--funded-soft);color:var(--funded)}
  .txn-confirmed .oc-t{font-weight:600;font-size:14.5px}
  .txn-confirmed .oc-s{font-size:12.5px;color:var(--ink-3);margin-top:2px}

  /* ---------- Materiality ---------- */
  .mat{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px}
  .mat.on{background:var(--amber-soft);color:var(--amber)}
  .mat.silent{background:var(--paper-2);color:var(--ink-3)}
  .mat .md{width:6px;height:6px;border-radius:50%;background:currentColor}
  .mat-note{font-size:12px;color:#a9a9a1;margin-top:14px;line-height:1.5;max-width:70ch}

  @media (max-width:980px){
    .lp-hero,.steps,.lp-two,.lp-trust .lp-inner{grid-template-columns:1fr}
    .lp-hero h1{font-size:42px}
    .lp-inner{padding:0 20px}
    .lp-mock{margin-top:20px}
  }

  /* ---------- Onboarding (full-bleed, no rail) ---------- */
  .app.onboarding-mode{grid-template-columns:1fr}
  .app.onboarding-mode .rail{display:none}
  .app.onboarding-mode main{padding:0;max-width:none}
  .ob{min-height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(1100px 520px at 80% -12%, rgba(18,112,90,.10), transparent 60%),
      radial-gradient(820px 460px at 4% 4%, rgba(30,58,95,.05), transparent 62%),
      var(--paper)}
  .ob-top{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;max-width:1180px;width:100%;margin:0 auto}
  .ob-brand{display:flex;align-items:center;gap:10px}
  .ob-brand .mark{width:28px;height:28px;border-radius:8px;flex:none;background:linear-gradient(135deg,var(--green),#147a61);display:grid;place-items:center;color:#fff;box-shadow:var(--sh-sm)}
  .ob-brand .name{font-weight:700;font-size:14px;letter-spacing:-0.02em}
  .ob-dots{display:flex;align-items:center;gap:7px}
  .ob-dots i{width:7px;height:7px;border-radius:99px;background:var(--hair-2);transition:all .35s cubic-bezier(.22,1,.36,1)}
  .ob-dots i.done{background:var(--green)}
  .ob-dots i.on{background:var(--green);width:22px}
  .ob-exit{font-size:13px;color:var(--ink-3);font-weight:600;background:transparent;border:0;padding:8px 10px;border-radius:9px}
  .ob-exit:hover{background:var(--paper-2)}
  .ob-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 24px 64px}
  .ob-col{width:100%;max-width:480px}
  .ob-col.ob-wide{max-width:560px}

  .ob-eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--green);font-weight:700;margin-bottom:18px}
  .ob-h{font-family:'Newsreader',Georgia,serif;font-weight:400;font-size:40px;line-height:1.12;letter-spacing:-0.02em;color:var(--ink);text-wrap:pretty}
  .ob-sub{font-size:16px;line-height:1.6;color:var(--ink-2);margin-top:18px;text-wrap:pretty}
  .ob-cta{margin-top:28px}
  .ob-reassure{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);margin-top:20px;line-height:1.4}
  .ob-reassure svg{flex:none;color:var(--green)}

  .ob-card{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);box-shadow:var(--sh-md);padding:22px 22px 20px}
  .ob-secure{display:flex;align-items:center;gap:9px;font-size:12px;background:var(--green-soft);color:var(--green-ink);border-radius:10px;padding:9px 12px;font-weight:600;margin-bottom:16px}
  .ob-secure svg{flex:none}
  .ob-banks{display:flex;flex-direction:column;gap:9px}
  .ob-bank{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--hair-2);border-radius:12px;background:#fff;text-align:left;font-weight:600;font-size:14px;color:var(--ink);transition:box-shadow .15s,border-color .15s,transform .12s;width:100%}
  .ob-bank:hover{box-shadow:var(--sh-sm);border-color:var(--green)}
  .ob-bank:active{transform:translateY(1px)}
  .ob-bank .bl{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;font-size:12.5px;color:#fff;letter-spacing:-0.02em}
  .ob-bank .chev{margin-left:auto;color:var(--ink-3);display:flex}

  .ob-analyze{text-align:center}
  .ob-orb{width:74px;height:74px;border-radius:50%;margin:0 auto 24px;background:radial-gradient(circle at 34% 30%,#3ad6ad,#0E5C4A);box-shadow:0 0 0 0 rgba(58,214,173,.5);animation:pulse 1.5s ease-in-out infinite}
  .ob-tasks{display:flex;flex-direction:column;gap:2px;text-align:left;max-width:330px;margin:24px auto 0}
  .ob-task{display:flex;align-items:center;gap:13px;padding:11px 4px;font-size:14.5px;font-weight:500;color:var(--ink-3);transition:color .3s;opacity:.55}
  .ob-task.active{color:var(--ink);opacity:1;font-weight:600}
  .ob-task.done{color:var(--ink-2);opacity:1}
  .ob-task .tick{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;border:2px solid var(--hair-2);color:transparent;transition:all .3s;box-sizing:border-box}
  .ob-task.done .tick{background:var(--funded);border-color:var(--funded);color:#fff}
  .ob-task.active .tick{border-color:var(--green);border-top-color:transparent;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ob-task .tick svg{width:13px;height:13px}

  .ob-note{display:flex;gap:10px;align-items:flex-start;margin-top:16px;padding:14px 16px;border:1px solid rgba(181,120,11,.28);background:var(--amber-soft);color:var(--amber);border-radius:12px;font-size:13.5px;font-weight:600;line-height:1.45}
  .ob-note svg{flex:none;margin-top:1px}
  .ob-clar-msg{font-size:13px;color:var(--funded);font-weight:600;margin-top:14px;line-height:1.45}
  .ob-clar-msg:empty{display:none}

  .ob-opts{display:flex;flex-direction:column;gap:9px}
  .ob-opt{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--hair-2);border-radius:12px;background:#fff;text-align:left;font-weight:600;font-size:14px;color:var(--ink);transition:border-color .15s,background .15s,box-shadow .15s;width:100%}
  .ob-opt:hover{border-color:var(--green)}
  .ob-opt[aria-pressed="true"]{border-color:var(--green);background:var(--green-soft);color:var(--green-ink);box-shadow:0 0 0 3px var(--green-soft)}
  .ob-opt .radio{width:19px;height:19px;border-radius:50%;border:2px solid var(--hair-2);flex:none;transition:border-color .15s;position:relative}
  .ob-opt[aria-pressed="true"] .radio{border-color:var(--green)}
  .ob-opt[aria-pressed="true"] .radio::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--green)}

  .ob-chk{border:1px solid var(--hair);border-radius:12px;background:#fff;margin-bottom:9px;overflow:hidden;box-shadow:var(--sh-sm)}
  .ob-chk>summary{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;list-style:none;font-weight:600;font-size:14px;color:var(--ink)}
  .ob-chk>summary::-webkit-details-marker{display:none}
  .ob-chk .ci{width:24px;height:24px;border-radius:50%;flex:none;display:grid;place-items:center}
  .ob-chk .ci svg{width:14px;height:14px}
  .ob-chk .ci.ok{background:var(--funded-soft);color:var(--funded)}
  .ob-chk .ci.warn{background:var(--amber-soft);color:var(--amber)}
  .ob-chk .cx{margin-left:auto;color:var(--ink-3);display:flex;transition:transform .2s}
  .ob-chk[open] .cx{transform:rotate(180deg)}
  .ob-chk .cbody{padding:0 16px 15px 52px;font-size:13px;color:var(--ink-2);line-height:1.55}
  .ob-overall{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:15px 18px;border-radius:13px;background:var(--green-soft);color:var(--green-ink)}
  .ob-overall .ov-v{font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px}

  .ob-foot{margin-top:26px;display:flex;align-items:center;gap:10px}
  .ob-back{background:transparent;border:0;color:var(--ink-3);font-weight:600;font-size:13.5px;padding:9px 10px 9px 6px;border-radius:9px;display:inline-flex;align-items:center;gap:5px}

/* ============================================================
   2.  STATE + COMPUTE ENGINE  (the priority waterfall)
       Taxes → Runway floor → Pay → Savings → Debt
   ============================================================ */

let state, activeKey='dev', activeView='catch', replanLog=[];

function loadPersona(key){
  activeKey=key;
  state=structuredClone(PERSONAS[key]);
  replanLog=[];
}

const fmt = n => '$'+Math.round(n).toLocaleString('en-US');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function activeRecurringTotal(s){
  return s.recurring.filter(r=>r.status==='active'||r.status==='new')
                    .reduce((a,r)=>a+r.amount,0);
}

// The core: turn current state into the Safe-to-Pay Number + funded allocation.
function computePlan(s){
  const late = s.flags.acmeLate;
  let inc = late ? {...s.income.late} : {...s.income.onTime};
  // source-event trigger: an extra Stripe payout lands
  if(s.flags.extraDeposit){ inc.low+=1450; inc.exp+=1450; inc.high+=1450; }
  // Transaction Interpreter: a confirmed low-confidence deposit becomes classified income
  if(s.flags.depositConfirmed){ const d=s.deposit?s.deposit.amount:4200; inc.low+=d; inc.exp+=d; inc.high+=d; }

  const taxGap = Math.max(0, s.tax.target - s.tax.setAside);          // top-up needed this period
  const recurring = activeRecurringTotal(s);
  const outflowHigh = recurring + s.variable.high;                    // conservative outflow
  const reserve = s.goal.runwayFloor;

  // Safe-to-Pay at a given income figure: keep taxes funded + runway >= floor
  const payAt = i => clamp(s.balance + i - outflowHigh - taxGap - reserve, 0, s.goal.targetPay);
  const hero = payAt(inc.low);     // conservative number = the one we promise
  const payExp = payAt(inc.exp);
  const payHigh = payAt(inc.high);

  // distribute the conservative pool through the waterfall (for funded status)
  let pool = s.balance + inc.low - outflowHigh;
  const taxAlloc = Math.min(pool, taxGap); pool -= taxAlloc;
  const runwayHeld = Math.min(pool, reserve); pool -= runwayHeld;
  const payAlloc = Math.min(pool, hero); pool -= payAlloc;

  // savings & debt follow the user's priority order for the remainder
  const order = s.goal.priority;
  const optional = { 'Savings':{target:s.goal.savingsGoal,alloc:0}, 'Debt':{target:s.goal.debt,alloc:0} };
  for(const name of order){
    if(optional[name]){ const o=optional[name]; o.alloc=Math.min(pool,o.target); pool-=o.alloc; }
  }

  const runwayBreach = runwayHeld < reserve - 1;
  const taxFunded = taxGap===0;
  const taxCovered = taxFunded || taxAlloc>=taxGap;   // fully set aside OR top-up scheduled this period

  const buckets = {
    'Taxes':       { target:s.tax.target,    alloc:s.tax.setAside+taxAlloc, status: (taxFunded||taxAlloc>=taxGap)?'ok':'warn',
                     sub: taxFunded?`Fully set aside · due ${s.tax.dueDate}`
                          : taxAlloc>=taxGap?`${fmt(taxGap)} top-up scheduled · due ${s.tax.dueDate} (${s.tax.daysDue} days)`
                          : `${fmt(taxGap-taxAlloc)} short · due ${s.tax.dueDate} (${s.tax.daysDue} days)` },
    'Runway floor':{ target:reserve, alloc:runwayHeld, status: runwayBreach?'bad':'ok',
                     sub: runwayBreach?`Below ${fmt(reserve)} floor — breach risk`:`Held above ${fmt(reserve)} floor` },
    'Pay yourself':{ target:s.goal.targetPay, alloc:payAlloc, status: payAlloc>=s.goal.targetPay?'ok':'warn',
                     sub: payAlloc>=s.goal.targetPay?`Target met`:`${fmt(s.goal.targetPay-payAlloc)} under target this period` },
    'Savings':     { target:s.goal.savingsGoal, alloc:optional.Savings.alloc,
                     status: optional.Savings.alloc>=s.goal.savingsGoal?'ok':(optional.Savings.alloc<=0?'paused':'warn'),
                     sub: optional.Savings.alloc<=0?'Paused — protecting tax & runway':(optional.Savings.alloc>=s.goal.savingsGoal?'Funded':'Partially funded') },
    'Debt':        { target:s.goal.debt, alloc:optional.Debt.alloc,
                     status: optional.Debt.alloc>=s.goal.debt?'ok':(optional.Debt.alloc<=0?'paused':'warn'),
                     sub: optional.Debt.alloc<=0?'Deferred this period':(optional.Debt.alloc>=s.goal.debt?'On schedule':'Partial payment') }
  };

  // The one decision + reasoning
  let decision, changed;
  if(s.key==='dev' && late){
    decision = `Lower this period's pay to ${fmt(hero)} and pause savings to hold runway above ${fmt(reserve)} through September — the ${fmt(taxGap)} tax gap is topped up first.`;
    changed  = `Acme's ${fmt(5000)} invoice slipped 30 days, so projected income for the period dropped.`;
  } else if(s.key==='dev'){
    decision = `Move ${fmt(taxGap)} into your tax reserve before ${s.tax.dueDate} to fully fund ${s.quarter}.`;
    changed  = `Q3 estimate is due in ${s.tax.daysDue} days and your set-aside is ${fmt(taxGap)} short.`;
  } else if(s.key==='sam'){
    decision = `Keep pay at ${fmt(hero)}; the ${fmt(s.windfall.amount)} deposit is smoothed over ${s.windfall.smoothMonths} months, not banked as monthly income.`;
    changed  = `A one-off ${fmt(s.windfall.amount)} deposit landed — treating it as recurring would over-promise next month.`;
  } else {
    decision = `You're on track — pay yourself ${fmt(hero)} and continue funding savings in priority order.`;
    changed  = `No changes since the last run. Taxes funded, runway holding.`;
  }

  return { hero, payExp, payHigh, inc, taxGap, taxFunded, taxCovered, taxAlloc, recurring, outflowHigh,
           reserve, buckets, runwayBreach, decision, changed, late };
}

/* ============================================================

function animateNumber(el, to, prefix='$'){
  const from = parseInt((el.dataset.val||'0'),10)||0;
  el.dataset.val=to;
  if(reduceMotion){ el.textContent=prefix+Math.round(to).toLocaleString('en-US'); return; }
  const dur=750, t0=performance.now();
  const snap=()=>{ el.textContent=prefix+Math.round(to).toLocaleString('en-US'); };
  function step(t){
    const k=Math.min(1,(t-t0)/dur);
    const e=1-Math.pow(1-k,3);
    el.textContent=prefix+Math.round(from+(to-from)*e).toLocaleString('en-US');
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  // safety: guarantee the final value even if rAF is throttled (tab blurred)
  setTimeout(snap, dur+120);
}

// runway area chart -> SVG string
function runwaySVG(s){
  const r = s.flags.acmeLate ? s.runway.late : s.runway.onTime;
  const mid=r.mid, floor=r.floor, n=mid.length;
  const W=560,H=210,padL=44,padR=14,padT=14,padB=26;
  const max=Math.max(...mid,floor)*1.12, min=Math.min(...mid,floor)*0.84;
  const x=i=>padL+(i*(W-padL-padR))/(n-1);
  const y=v=>padT+(1-(v-min)/(max-min))*(H-padT-padB);
  const lowOff=r.lowOffset||Math.max(...mid)*0.07;
  const lo=mid.map(v=>v-lowOff), hi=mid.map(v=>v+lowOff*0.6);
  const path=arr=>arr.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const band=path(hi)+' '+lo.map((v,i)=>'L'+x(n-1-i).toFixed(1)+' '+y(lo[n-1-i]).toFixed(1)).reverse().join(' ')+' Z';
  const months=['Sep','Oct','Nov','Dec','Jan','Feb'];
  let breachMark='';
  if(r.breach!=null){
    const bx=x(r.breach), by=y(lo[r.breach]);
    breachMark=`<circle cx="${bx}" cy="${by}" r="5" fill="#fff" stroke="#B23A3A" stroke-width="2.5"/>
      <text x="${bx+8}" y="${by-8}" fill="#B23A3A" font-weight="700">breach risk</text>`;
  }
  const yticks=[min,(min+max)/2,max].map(v=>`<text x="${padL-8}" y="${(y(v)+3).toFixed(1)}" text-anchor="end">${'$'+Math.round(v/1000)+'k'}</text>`).join('');
  return `<svg class="chart-wrap" viewBox="0 0 ${W} ${H}" role="img" aria-label="Runway projection over six months">
    <defs><linearGradient id="rg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#12705a" stop-opacity=".22"/><stop offset="1" stop-color="#12705a" stop-opacity="0"/>
    </linearGradient></defs>
    ${yticks}
    <path d="${band}" fill="#1E3A5F" opacity=".10"/>
    <path d="${path(mid)} L ${x(n-1)} ${H-padB} L ${x(0)} ${H-padB} Z" fill="url(#rg)"/>
    <path d="${path(mid)}" fill="none" stroke="#0E5C4A" stroke-width="2.5" stroke-linejoin="round"/>
    <line class="floor-line" x1="${padL}" y1="${y(floor)}" x2="${W-padR}" y2="${y(floor)}"/>
    <text x="${W-padR}" y="${y(floor)-6}" text-anchor="end" fill="#B23A3A">floor ${'$'+(floor/1000)+'k'}</text>
    ${mid.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="#0E5C4A"/>`).join('')}
    ${breachMark}
    ${months.slice(0,n).map((m,i)=>`<text x="${x(i)}" y="${H-7}" text-anchor="middle">${m}</text>`).join('')}
  </svg>`;
}

// tax gauge (semicircle) -> SVG
function gaugeSVG(s){
  const pct=clamp(s.tax.setAside/s.tax.target,0,1);
  const R=70,cx=80,cy=82,sw=14;
  const a0=Math.PI, a1=Math.PI*(1-pct);
  const pt=a=>[cx+R*Math.cos(a),cy-R*Math.sin(a)];
  const [sx,sy]=pt(a0),[ex,ey]=pt(a1);
  const large=pct>0.5?1:0;
  const col = pct>=1?'#1E7A5E':(pct>=0.75?'#B5780B':'#B23A3A');
  const [bx,by]=pt(0);
  return `<svg width="160" height="100" viewBox="0 0 160 100" role="img" aria-label="Tax set-aside ${Math.round(pct*100)} percent funded">
    <path d="M ${sx} ${sy} A ${R} ${R} 0 0 1 ${bx} ${by}" fill="none" stroke="#EFEFEC" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M ${sx} ${sy} A ${R} ${R} 0 ${large} 1 ${ex} ${ey}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>
    <text x="80" y="74" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">${Math.round(pct*100)}%</text>
    <text x="80" y="92" text-anchor="middle" font-size="10">of ${fmt(s.tax.target)}</text>
  </svg>`;
}

/* ----- Transaction Interpreter (the load-bearing AI moment) ----- */
function bucketsHTML(p){
  const order=state.goal.priority;
  return order.map((name,i)=>{
    const b=p.buckets[name]; if(!b) return '';
    const pct=clamp(b.target>0?b.alloc/b.target:1,0,1)*100;
    const fillClass = b.status==='paused'?'paused':(b.status==='bad'?'bad':(b.status==='warn'?'warn':'ok'));
    const pill = b.status==='ok'?'<span class="pill ok"><span class="pdot"></span>Funded</span>'
               : b.status==='paused'?'<span class="pill neutral"><span class="pdot"></span>Paused</span>'
               : b.status==='bad'?'<span class="pill bad"><span class="pdot"></span>Breach risk</span>'
               : '<span class="pill warn"><span class="pdot"></span>Short</span>';
    return `<div class="bucket">
      <span class="bk-rank">${i+1}</span>
      <div class="bk-main">
        <div class="bk-top"><span class="bk-name">${name} ${pill}</span><span class="bk-amt mono">${fmt(b.alloc)}${b.target?` <span style="color:var(--ink-3);font-weight:500">/ ${fmt(b.target)}</span>`:''}</span></div>
        <div class="bk-bar"><div class="bk-fill ${fillClass}" style="width:${pct}%"></div></div>
        <div class="bk-sub">${b.sub}</div>
      </div></div>`;
  }).join('');
}

function resolveDeposit(isIncome){
  if(!isIncome){

    document.getElementById('txnPanel').outerHTML=interpreterHTML();

function bindPriorityDrag(){
  const list=document.getElementById('prioList');
  let dragEl=null;
  list.querySelectorAll('.prio-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{ dragEl=item; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{ item.classList.remove('dragging'); list.querySelectorAll('.over').forEach(x=>x.classList.remove('over')); commitPriority(); });
    item.addEventListener('dragover',e=>{ e.preventDefault();
      if(!dragEl||item===dragEl) return;
      item.classList.add('over');
      const rect=item.getBoundingClientRect();
      const after=(e.clientY-rect.top)/rect.height>0.5;
      list.insertBefore(dragEl, after?item.nextSibling:item);
    });
    item.addEventListener('dragleave',()=>item.classList.remove('over'));
  });
}
function commitPriority(){
  const list=document.getElementById('prioList');
  state.goal.priority=[...list.querySelectorAll('.prio-item')].map(x=>x.dataset.name);

let clock=2110;
function stamp(){ clock+=Math.floor(7+Math.random()*30); const h=String(21+Math.floor(clock/3600)).padStart(2,'0'); const m=String(Math.floor((clock%3600)/60)).padStart(2,'0'); return `${h}:${m}`; }

function materiality(type, before, after, s){
  const delta=Math.abs(after-before);
  if(type==='manual') return {on:true, label:'Material · runway floor at risk'};
  if(type==='init'){
    if(s.flags.acmeLate) return {on:true, label:'Surfaced · runway floor at risk'};
    if(s.tax.daysDue<=14) return {on:true, label:`Surfaced · tax proximity (${s.tax.daysDue}d)`};
    return {on:false, label:'Below threshold · staying silent'};
  }
  if(type==='schedule'){
    if(s.tax.daysDue<=14) return {on:true, label:`Material · tax proximity (${s.tax.daysDue}d)`};
    return {on:false, label:'Below threshold · staying silent'};
  }
  if(delta>=250) return {on:true, label:`Material · Safe-to-Pay Δ ${after>before?'+':'−'}${fmt(delta)}`};
  return {on:false, label:'Below threshold · staying silent'};
}
function materialityBadge(m){
  return `<span class="mat ${m.on?'on':'silent'}"><span class="md"></span>${m.label}</span>`;
}

function fireTrigger(type){
  const before=computePlan(state).hero;
  const orb=document.getElementById('orb'), txt=document.getElementById('agentTxt');
  const hero=document.getElementById('heroCard'); // may not exist on this view

  // mutate state per trigger
  let label,color;
  if(type==='source'){
    state.flags.extraDeposit=true;
    label='Source event · txn webhook';
    color='#1E7A5E';
  }else if(type==='manual'){
    state.flags.acmeLate=true;
    label='Manual feedback · "Acme paid late"';
    color='#B23A3A';
  }else{
    state.flags.nightly++;
    state.tax.daysDue=Math.max(1,state.tax.daysDue-1);
    label='Schedule · nightly run';
    color='#1E3A5F';
  }

  // thinking state
  orb.classList.add('busy');
  txt.innerHTML='<b>Re-planning…</b> reading sources → recompute allocation → protect floors';
  const heroNum=document.getElementById('replanNum');

  const finish=()=>{
    orb.classList.remove('busy');
    const p=computePlan(state);
    const after=p.hero;
    const m=materiality(type,before,after,state);
    const mb=document.getElementById('matBadge'); if(mb) mb.innerHTML=materialityBadge(m);
    txt.innerHTML = m.on
      ? `<b>Done.</b> ${fmt(before)} → <b>${fmt(after)}</b> · ${m.label} · surfaced one decision.`
      : `<b>Done.</b> ${fmt(before)} → <b>${fmt(after)}</b> · ${m.label}.`;
    animateNumber(heroNum,after);
    heroNum.classList.remove('num-flash'); void heroNum.offsetWidth; heroNum.classList.add('num-flash');
    document.getElementById('replanDecision').textContent=p.decision;
    document.getElementById('replanWhy').innerHTML='<b>Why:</b> '+p.changed;
    const dir = after<before?'lowered':(after>before?'raised':'held');
    replanLog.unshift({time:stamp(),color,
      text:`<b>${label}</b> — ${dir} the number to <span class="mono">${fmt(after)}</span>. ${materialityBadge(m)}`});
    drawLog();
    renderRail();
  };

  if(reduceMotion){ finish(); }
  else { setTimeout(finish, 1400); }
}

const INFO_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v5M12 8h.01" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>';
const WARN_SVG='<svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function obReset(){ ob={ step:'welcome', txnChoice:null, cadence:null }; loadPersona('dev'); }

function obDots(active){
  let out='<div class="ob-dots" aria-hidden="true">';
  for(let i=0;i<OB_DOTS_N;i++){ out+=`<i class="${i<active?'done':(i===active?'on':'')}"></i>`; }
  return out+'</div>';
}
function obShell(dotIdx, body, wide){
  return `<div class="ob">
    <header class="ob-top no-print">
      <div class="ob-brand"><div class="mark">${MARK_SVG}</div><div class="name">Cashflow Companion</div></div>
      ${dotIdx>=0?obDots(dotIdx):'<span></span>'}
      <button class="ob-exit" data-view="landing">Exit</button>
    </header>
    <div class="ob-stage"><div class="ob-col ${wide?'ob-wide':''} fade-up">${body}</div></div>
  </div>`;
}

function obGo(step){
  ob.step=step;
  renderOnboarding();
  const host=document.getElementById('view-onboarding');
  window.scrollTo({top:0,behavior:reduceMotion?'auto':'smooth'});
  host.focus({preventScroll:true});
}

/* ---- step bodies ---- */
function obWelcome(){
  return `<div class="ob-eyebrow">Welcome</div>
    <h1 class="ob-h">How much can you safely pay yourself today?</h1>
    <p class="ob-sub">Connect your bank and we'll analyze your income, recurring expenses, upcoming taxes, and cash flow to calculate one number — the amount you can safely move into your personal account.</p>
    <div class="ob-cta"><button class="btn primary lg" onclick="obGo('connect')">Connect bank</button></div>
    <div class="ob-reassure">${LOCK_SVG}Read-only, bank-level encryption. Cashflow Companion never moves your money.</div>`;
}
function obConnect(){
  const banks=[['Chase Bank','CH','#117ACA'],['Bank of America','BA','#B01F24'],['Wells Fargo','WF','#C4161C'],['Mercury','MR','#5266EB'],['Other bank','··','#86867F']];
  return `<div class="ob-eyebrow">Connect</div>
    <h1 class="ob-h" style="font-size:30px">Choose your bank</h1>
    <p class="ob-sub" style="font-size:14.5px;margin-top:12px">A secure, read-only connection. We can read transactions to analyze them — we can never move money.</p>
    <div class="ob-card" style="margin-top:20px">
      <div class="ob-secure">${SHIELD_SVG}Encrypted · read-only · disconnect anytime</div>
      <div class="ob-banks">
        ${banks.map(([n,i,c])=>`<button class="ob-bank" onclick="obGo('analyze')"><span class="bl" style="background:${c}">${i}</span>${n}<span class="chev">${CHEV_R}</span></button>`).join('')}
      </div>
    </div>
    <div class="ob-foot"><button class="ob-back" onclick="obGo('welcome')">${CHEV_L}Back</button></div>`;
}
function obAnalyze(){
  const tasks=['Analyzing income patterns','Detecting recurring expenses','Estimating tax obligations','Building your financial model','Calculating your Safe-to-Pay'];
  return `<div class="ob-analyze">
    <div class="ob-orb"></div>
    <h1 class="ob-h" style="font-size:26px">Reading your finances…</h1>
    <p class="ob-sub" style="font-size:14px;margin-top:10px">Building a model of how money moves through your business. A few seconds.</p>
    <div class="ob-tasks" id="obTasks">
      ${tasks.map(t=>`<div class="ob-task"><span class="tick">${CHECK_SVG}</span>${t}</div>`).join('')}
    </div>
  </div>`;
}
function obRunAnalyze(){
  const tasks=[...document.querySelectorAll('#obTasks .ob-task')];
  let i=0; const dur=reduceMotion?240:820;
  (function next(){
    if(ob.step!=='analyze') return;
    if(i>0){ tasks[i-1].classList.remove('active'); tasks[i-1].classList.add('done'); }
    if(i<tasks.length){ tasks[i].classList.add('active'); i++; setTimeout(next,dur); }
    else setTimeout(()=>{ if(ob.step==='analyze') obGo('recommend'); }, reduceMotion?200:620);
  })();
}
function obRecommend(){
  return `<div class="ob-eyebrow">Your first recommendation</div>
    <div class="hero" id="obHeroCard" style="margin-top:14px">
      <div class="h-lbl">Safe to pay today</div>
      <div class="h-num" id="obHeroNum">$0</div>
      <div class="h-reason" style="margin-top:14px">You're on track to cover your bills and taxes.</div>
    </div>
    <div class="ob-note">${WARN_SVG}We found one thing that might affect this recommendation.</div>
    <div class="ob-foot"><button class="btn primary lg" onclick="obGo('clarify')" style="margin-left:auto">Continue</button></div>`;
}
function obRevealHero(to){
  const n=document.getElementById('obHeroNum'); if(!n) return;
  n.dataset.val=0;
  if(reduceMotion){ n.textContent=fmt(to); return; }
  const card=document.getElementById('obHeroCard'); card.classList.add('thinking');
  setTimeout(()=>{ card.classList.remove('thinking'); animateNumber(n,to); }, 700);
}
function obClarify(){
  const p=computePlan(state); const d=state.deposit;
  const pressed=c=>ob.txnChoice===c?'true':'false';
  return `<div class="ob-eyebrow">One quick check</div>
    <h1 class="ob-h" style="font-size:27px">This recommendation depends on one transaction.</h1>
    <div class="hero" id="obClarHero" style="margin-top:18px;padding:22px 26px">
      <div class="h-lbl">Safe to pay today</div>
      <div class="h-num" id="obClarNum" style="font-size:46px">${fmt(p.hero)}</div>
    </div>
    <div class="ob-card" style="margin-top:16px">
      <span class="txn-flag">${INFO_SVG}Unclassified deposit · needs your read</span>
      <div class="txn-amt">${fmt(d.amount)}</div>
      <div class="txn-q">Zelle — John Rivera</div>
      <div class="txn-meta">We can't tell if this is business income or a personal transfer. Your answer changes the number above.</div>
      <div class="ob-opts" id="obTxnOpts" style="margin-top:16px">
        <button class="ob-opt" data-choice="income" aria-pressed="${pressed('income')}" onclick="obChooseTxn('income')"><span class="radio"></span>Client income</button>
        <button class="ob-opt" data-choice="personal" aria-pressed="${pressed('personal')}" onclick="obChooseTxn('personal')"><span class="radio"></span>Personal transfer</button>
      </div>
      <div class="ob-clar-msg" id="obClarMsg"></div>
    </div>
    <div class="ob-foot">
      <button class="ob-back" onclick="obGo('recommend')">${CHEV_L}Back</button>
      <button class="btn primary" id="obClarNext" onclick="obGo('trust')" ${ob.txnChoice?'':'disabled'} style="margin-left:auto">Continue</button>
    </div>`;
}
function obChooseTxn(choice){
  ob.txnChoice=choice;
  state.flags.depositConfirmed = choice==='income';
  state.flags.depositDismissed = choice!=='income';
  document.querySelectorAll('#obTxnOpts .ob-opt').forEach(b=>b.setAttribute('aria-pressed', b.dataset.choice===choice));
  const p=computePlan(state);
  const num=document.getElementById('obClarNum');
  const card=document.getElementById('obClarHero');
  const done=()=>{
    card.classList.remove('thinking');
    animateNumber(num,p.hero);
    num.classList.remove('num-flash'); void num.offsetWidth; num.classList.add('num-flash');
    document.getElementById('obClarMsg').innerHTML = choice==='income'
      ? `Counted as client income — your Safe-to-Pay rose to the full <b class="mono">${fmt(p.hero)}</b> target.`
      : `Kept out of income — your Safe-to-Pay holds at <b class="mono">${fmt(p.hero)}</b>. We logged the correction.`;
    document.getElementById('obClarNext').removeAttribute('disabled');
  };
  if(reduceMotion){ done(); } else { card.classList.add('thinking'); setTimeout(done,820); }
}
function obTrust(){
  const p=computePlan(state), s=state;
  const rows=[
    ['ok', p.taxCovered?'Taxes covered':'Taxes — top-up scheduled',
      `${fmt(s.tax.setAside)} is set aside toward your ${fmt(s.tax.target)} ${s.quarter} estimate. The ${fmt(p.taxGap)} gap is scheduled before ${s.tax.dueDate}.`],
    ['ok','Recurring bills covered',
      `We detected ${s.recurring.filter(r=>r.status==='active'||r.status==='new').length} recurring charges (${fmt(p.recurring)}/mo) — rent, software, insurance — all covered by projected cash.`],
    ['ok','Runway protected',
      `Your balance stays above the ${fmt(p.reserve)} floor we set from your typical monthly spending. This is what keeps the number safe.`],
    ['warn','Waiting on one expected invoice',
      `Acme Corp's ${fmt(5000)} invoice is about 30 days late. Your number already assumes it won't arrive — the moment it clears, we raise your Safe-to-Pay automatically.`]
  ];
  return `<div class="ob-eyebrow">Why you can trust this</div>
    <h1 class="ob-h" style="font-size:27px">Here's what's behind your number.</h1>
    <p class="ob-sub" style="font-size:14px;margin-top:10px">Not accounting jargon — just what we checked, and how sure we are. Tap any line for detail.</p>
    <div style="margin-top:20px">
      ${rows.map(([st,t,b])=>`<details class="ob-chk"><summary><span class="ci ${st}">${st==='ok'?CHECK_SVG:WARN_SVG}</span>${t}<span class="cx">${CHEV_D}</span></summary><div class="cbody">${b}</div></details>`).join('')}
    </div>
    <div class="ob-overall"><span style="font-weight:600;font-size:14px">Overall confidence</span><span class="ov-v">${SHIELD_SVG}&nbsp;High</span></div>
    <div class="ob-foot"><button class="ob-back" onclick="obGo('clarify')">${CHEV_L}Back</button><button class="btn primary lg" onclick="obGo('cadence')" style="margin-left:auto">Continue</button></div>`;
}
function obCadence(){
  const opts=['Weekly','Every two weeks','Monthly','Whenever cash comes in'];
  return `<div class="ob-eyebrow">Last thing — optional</div>
    <h1 class="ob-h" style="font-size:28px">When do you usually pay yourself?</h1>
    <p class="ob-sub" style="font-size:14px;margin-top:10px">This just sets when we check in with you. You can change it anytime.</p>
    <div class="ob-opts" id="obCadOpts" style="margin-top:20px">
      ${opts.map(o=>`<button class="ob-opt" aria-pressed="${ob.cadence===o?'true':'false'}" onclick="obPickCadence('${o}')"><span class="radio"></span>${o}</button>`).join('')}
    </div>
    <div class="ob-foot"><button class="ob-skip" onclick="obFinish()">Skip</button><button class="btn primary lg" onclick="obFinish()" style="margin-left:auto">Enter Cashflow Companion</button></div>`;
}
function obPickCadence(o){
  ob.cadence=o;
  document.querySelectorAll('#obCadOpts .ob-opt').forEach(b=>b.setAttribute('aria-pressed', b.textContent.trim()===o));
}
function obFinish(){ setView('dashboard'); }

function renderOnboarding(){
  const host=document.getElementById('view-onboarding');
  switch(ob.step){
    case 'welcome':   host.innerHTML=obShell(0,obWelcome()); break;
    case 'connect':   host.innerHTML=obShell(0,obConnect()); break;
    case 'analyze':   host.innerHTML=obShell(1,obAnalyze()); obRunAnalyze(); break;
    case 'recommend': host.innerHTML=obShell(2,obRecommend()); obRevealHero(computePlan(state).hero); break;
    case 'clarify':   host.innerHTML=obShell(2,obClarify(),true); break;
    case 'trust':     host.innerHTML=obShell(3,obTrust(),true); break;
    case 'cadence':   host.innerHTML=obShell(4,obCadence()); break;
    default:          ob.step='welcome'; host.innerHTML=obShell(0,obWelcome());
  }
}

const RENDERERS={landing:renderLanding,onboarding:renderOnboarding,catch:renderCatch,dashboard:renderDashboard,goals:renderGoals,replan:renderReplan,plan:renderPlan,email:renderEmail,curtain:renderCurtain};

function setView(v,focus=true){
  const prev=activeView;
  activeView=v;
  if(v==='onboarding' && prev!=='onboarding') obReset();
  document.querySelector('.app').classList.toggle('landing-mode', v==='landing');
  document.querySelector('.app').classList.toggle('onboarding-mode', v==='onboarding');
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  RENDERERS[v]();
  const sec=document.getElementById('view-'+v);
  sec.classList.add('active');
  renderRail();
  if(focus){ window.scrollTo({top:0,behavior:reduceMotion?'auto':'smooth'}); sec.focus({preventScroll:true}); }
}

function setPersona(k){
  loadPersona(k);
  // re-render current view with a fade
  const sec=document.getElementById('view-'+activeView);
  if(!reduceMotion){ sec.classList.remove('fade-up'); void sec.offsetWidth; }
  RENDERERS[activeView]();
  if(!reduceMotion){ sec.querySelectorAll('.card,.catch-card,.hero,.phone,.plan-doc').forEach((el,i)=>{el.classList.add('fade-up'); el.style.animationDelay=(i*0.04)+'s';}); }
  renderRail();
}

// event delegation: nav, persona, and any [data-view] CTA
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-view]');
  if(nav){ setView(nav.dataset.view); return; }
  const per=e.target.closest('[data-persona]');
  if(per){ setPersona(per.dataset.persona); }
});

// keyboard: number keys jump views (nice for demo)
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if((e.key==='Enter'||e.key===' ') && e.target.dataset && e.target.dataset.view){ e.preventDefault(); setView(e.target.dataset.view); return; }
  const map={'0':'landing','1':'catch','2':'dashboard','3':'goals','4':'replan','5':'plan','6':'email','7':'curtain','8':'onboarding'};
  if(map[e.key]) setView(map[e.key]);
});

// BOOT — open on the landing page; "See the demo" enters the app on the catch  // ◆ BEAT 0
loadPersona('dev');
setView('landing',false);
renderRail();
</script>
</body>
</html>
